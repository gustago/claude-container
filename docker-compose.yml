services:
  claude-code:                                                                                                          
    build: .                                                                                                          
    container_name: claude-code
    user: root                                                                                                          
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}                                                                          
    volumes:
      - ${PROJECTS_PATH:-./projects}:/projects
      - claude-home:/root/.claude
    restart: unless-stopped                                                                                             
    cap_drop:
      - ALL

volumes:
  claude-home: